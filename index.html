<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Godfidence">
<meta name="theme-color" content="#fafaf8">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icon.png">
<title>Godfidence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:wght@300;400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafaf8;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text: #1a1a18;
    --muted: #9a9890;
    --accent: #c8a96e;
    --accent-soft: #f5efe4;
    --danger: #c0392b;
    --danger-soft: #fdf0ee;
    --radius: 16px;
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overscroll-behavior: none;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    background: var(--bg);
  }

  /* ── HEADER ── */
  .header {
    padding: calc(20px + var(--safe-top)) 24px 0;
    background: var(--bg);
    flex-shrink: 0;
  }
  .header-top {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .logo-name {
    font-family: 'Cormorant', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 1;
  }
  .logo-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 4px;
  }
  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--accent-soft);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .icon-btn:active { background: #ecdfc9; }

  .search-wrap { margin-bottom: 24px; }
  #searchInput {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  #searchInput::placeholder { color: var(--muted); }
  #searchInput:focus { border-color: var(--accent); }

  /* ── BREADCRUMB ── */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 24px;
    margin-bottom: 12px;
    flex-shrink: 0;
    min-height: 28px;
  }
  .breadcrumb-home {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
    font-family: 'Jost', sans-serif;
  }
  .breadcrumb-sep {
    font-size: 12px;
    color: var(--muted);
  }
  .breadcrumb-current {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 0 24px;
    margin-bottom: 12px;
    flex-shrink: 0;
  }

  /* ── LIST ── */
  .pdf-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px;
    padding-bottom: calc(24px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;
  }

  /* ── FOLDER CARD ── */
  .folder-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--accent-soft);
    border: 1px solid #e8dfc8;
    border-radius: var(--radius);
    padding: 16px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .folder-card:active { transform: scale(0.98); }
  .folder-card:hover { border-color: var(--accent); }
  .folder-card-favorites { border-color: var(--accent); background: #faf3e6; }
  .folder-left { display: flex; align-items: center; gap: 14px; }
  .folder-icon { font-size: 22px; line-height: 1; }
  .folder-name {
    font-family: 'Cormorant', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
  }
  .folder-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .folder-actions { display: flex; gap: 8px; align-items: center; }
  .card-action-btn {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    border: none;
    background: transparent;
    font-size: 15px;
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .card-action-btn:hover { background: var(--border); color: var(--text); }
  .card-action-btn.danger:hover { background: var(--danger-soft); color: var(--danger); }

  /* ── PDF CARD ── */
  .pdf-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
  }
  .pdf-card:active { transform: scale(0.98); }
  .pdf-card:hover { border-color: var(--accent); }
  .pdf-left { display: flex; align-items: center; gap: 14px; flex: 1; min-width: 0; }
  .pdf-icon { font-size: 20px; flex-shrink: 0; }
  .pdf-info { min-width: 0; flex: 1; }
  .pdf-title {
    font-family: 'Cormorant', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pdf-meta {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pdf-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; margin-left: 8px; }
  .pdf-actions .card-action-btn { width: 27px; height: 27px; font-size: 14px; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }
  .empty-icon { font-size: 40px; margin-bottom: 16px; opacity: 0.4; }
  .empty-title {
    font-family: 'Cormorant', serif;
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    margin-bottom: 8px;
  }
  .empty-sub { font-size: 13px; line-height: 1.6; }

  /* ── MODALS ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,24,0.45);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 28px 24px calc(28px + var(--safe-bottom));
    width: 100%;
    max-width: 430px;
  }
  .modal-title {
    font-family: 'Cormorant', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 20px;
    color: var(--text);
  }
  .modal-input {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-select {
    width: 100%;
    padding: 12px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    outline: none;
    margin-bottom: 16px;
    -webkit-appearance: none;
    appearance: none;
    cursor: pointer;
  }
  .modal-select:focus { border-color: var(--accent); }
  .modal-btn-row { display: flex; gap: 10px; }
  .btn-primary {
    flex: 1;
    padding: 13px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 400;
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s;
  }
  .btn-primary:active { opacity: 0.8; }
  .btn-secondary {
    flex: 1;
    padding: 13px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:active { border-color: var(--muted); }
  .modal-label {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: block;
  }
  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 28px 20px;
    text-align: center;
    margin-bottom: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: var(--bg);
  }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--accent-soft); }
  .upload-zone-icon { font-size: 28px; margin-bottom: 10px; }
  .upload-zone-text { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .upload-zone-text strong { color: var(--accent); font-weight: 400; }
  #fileInput { display: none; }

  /* ── VIEWER ── */
  #viewer {
    display: none;
    position: fixed;
    inset: 0;
    background: #fff;
    z-index: 100;
    flex-direction: column;
  }
  #viewer.open { display: flex; }
  .viewer-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(14px + var(--safe-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
    background: #fff;
    flex-shrink: 0;
  }
  .viewer-bar button {
    padding: 8px 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
  }
  #viewerTitle {
    font-family: 'Cormorant', serif;
    font-size: 20px;
    font-weight: 400;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  #pdfFrame {
    flex: 1;
    width: 100%;
    border: none;
    background: var(--bg);
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: calc(24px + var(--safe-bottom));
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--text);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-family: 'Jost', sans-serif;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s, transform 0.25s;
    white-space: nowrap;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo-name">this shall too pass</div>
        <div class="logo-sub" id="logoSub">dolce far niente</div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="addPdfBtn" title="Add PDF" onclick="openAddPdf()">＋</button>
        <button class="icon-btn" id="newFolderBtn" title="New Folder" onclick="openNewFolder()">📁</button>
      </div>
    </div>
    <div class="search-wrap">
      <input type="search" id="searchInput" placeholder="Search…" oninput="onSearch(this.value)">
    </div>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="section-label" id="countLabel">All Documents</div>
  <div class="pdf-list" id="pdfList"></div>
</div>

<!-- PDF VIEWER -->
<div id="viewer">
  <div class="viewer-bar">
    <button onclick="closeViewer()">← Back</button>
    <div id="viewerTitle">Document</div>
  </div>
  <iframe id="pdfFrame" src=""></iframe>
</div>

<!-- NEW FOLDER MODAL -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <div class="modal-title" id="folderModalTitle">New Folder</div>
    <span class="modal-label">Folder Name</span>
    <input class="modal-input" id="folderNameInput" placeholder="e.g. Duas, Tafsir…" maxlength="40">
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeFolderModal()">Cancel</button>
      <button class="btn-primary" onclick="saveFolder()">Save</button>
    </div>
  </div>
</div>

<!-- ADD PDF MODAL -->
<div class="modal-overlay" id="addPdfModal">
  <div class="modal">
    <div class="modal-title">Add PDF</div>
    <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-zone-icon">📄</div>
      <div class="upload-zone-text" id="uploadZoneText">Tap to choose a PDF<br><strong>from your device</strong></div>
    </div>
    <input type="file" id="fileInput" accept="application/pdf" multiple>
    <span class="modal-label">Title (optional)</span>
    <input class="modal-input" id="pdfTitleInput" placeholder="Leave blank to use filename">
    <span class="modal-label">Add to Folder</span>
    <select class="modal-select" id="pdfFolderSelect">
      <option value="">— No folder —</option>
    </select>
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeAddPdf()">Cancel</button>
      <button class="btn-primary" onclick="savePdf()">Add to Library</button>
    </div>
  </div>
</div>

<!-- MOVE PDF MODAL -->
<div class="modal-overlay" id="movePdfModal">
  <div class="modal">
    <div class="modal-title">Move to Folder</div>
    <select class="modal-select" id="moveFolderSelect">
      <option value="">— No folder —</option>
    </select>
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeMoveModal()">Cancel</button>
      <button class="btn-primary" onclick="confirmMove()">Move</button>
    </div>
  </div>
</div>

<!-- RENAME PDF MODAL -->
<div class="modal-overlay" id="pdfRenameModal">
  <div class="modal">
    <div class="modal-title">Rename Document</div>
    <span class="modal-label">Title</span>
    <input class="modal-input" id="pdfRenameInput" placeholder="Document title" maxlength="80">
    <div class="modal-btn-row">
      <button class="btn-secondary" onclick="closeRenamePdfModal()">Cancel</button>
      <button class="btn-primary" onclick="saveRenamePdf()">Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
// This project ships with no preloaded PDFs — your device storage is the only library.
const BUILT_IN = [];

let state = {
  folders: [],   // { id, name, isFavorites? }
  pdfs: [],      // { id, title, folderId|null, storeKey|null, url?, builtin?, favorite }
  currentFolder: null,   // folder id, "favorites", or null = root
  editingFolderId: null,
  movingPdfId: null,
  renamingPdfId: null,
  pendingFiles: [],      // FileList staging for upload modal
};

// ─────────────────────────────────────────────
// INDEXEDDB for PDF blobs
// ─────────────────────────────────────────────
let db;
function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open("godfidence-pdfs", 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore("pdfs");
    req.onsuccess = e => { db = e.target.result; res(); };
    req.onerror = () => rej();
  });
}
function storeBlob(key, blob) {
  return new Promise((res, rej) => {
    const tx = db.transaction("pdfs", "readwrite");
    tx.objectStore("pdfs").put(blob, key);
    tx.oncomplete = res;
    tx.onerror = rej;
  });
}
function getBlob(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction("pdfs", "readonly");
    const req = tx.objectStore("pdfs").get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}
function deleteBlob(key) {
  return new Promise((res, rej) => {
    const tx = db.transaction("pdfs", "readwrite");
    tx.objectStore("pdfs").delete(key);
    tx.oncomplete = res;
    tx.onerror = rej;
  });
}

// ─────────────────────────────────────────────
// PERSIST
// ─────────────────────────────────────────────
function saveState() {
  localStorage.setItem("gdf-folders", JSON.stringify(state.folders));
  localStorage.setItem("gdf-pdfs", JSON.stringify(state.pdfs));
}
function loadState() {
  state.folders = JSON.parse(localStorage.getItem("gdf-folders") || "[]");
  state.pdfs    = JSON.parse(localStorage.getItem("gdf-pdfs")    || "[]");
}

// Ensure the pinned Favorites folder exists
function ensureFavoritesFolder() {
  if (!state.folders.find(f => f.isFavorites)) {
    state.folders.unshift({ id: "favorites", name: "Favorites", isFavorites: true });
    saveState();
  }
}

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2200);
}

function folderPdfCount(fid) {
  return state.pdfs.filter(p => p.folderId === fid).length;
}

function allPdfsInView() {
  if (state.currentFolder === "favorites") {
    return state.pdfs.filter(p => p.favorite);
  } else if (state.currentFolder) {
    return state.pdfs.filter(p => p.folderId === state.currentFolder);
  } else {
    return state.pdfs.filter(p => !p.folderId);
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render(searchQ = "") {
  const list = document.getElementById("pdfList");
  const countLabel = document.getElementById("countLabel");
  const breadcrumb = document.getElementById("breadcrumb");
  const logoSub = document.getElementById("logoSub");
  const q = searchQ.toLowerCase().trim();

  list.innerHTML = "";

  // Breadcrumb
  if (state.currentFolder) {
    const folder = state.folders.find(f => f.id === state.currentFolder);
    breadcrumb.innerHTML = `
      <button class="breadcrumb-home" onclick="goRoot()">Library</button>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">${folder ? folder.name : "Folder"}</span>
    `;
    logoSub.textContent = folder ? folder.name : "Folder";
  } else {
    breadcrumb.innerHTML = `<span class="breadcrumb-current">All Documents</span>`;
    logoSub.textContent = "Your Library";
  }

  let items = [];

  if (!state.currentFolder && !q) {
    // Root view: show folders first (Favorites pinned to top), then root PDFs
    const folders = [...state.folders].sort((a, b) => (b.isFavorites ? 1 : 0) - (a.isFavorites ? 1 : 0));
    const pdfs = allPdfsInView();

    countLabel.textContent = `${folders.length} folder${folders.length !== 1 ? "s" : ""} · ${pdfs.length} document${pdfs.length !== 1 ? "s" : ""}`;

    if (folders.length === 0 && pdfs.length === 0) {
      list.innerHTML = emptyHTML("No documents yet", "Tap ＋ to add your first PDF.");
      return;
    }

    folders.forEach(folder => renderFolderCard(folder, list));
    pdfs.forEach(pdf => renderPdfCard(pdf, list));
    return;
  }

  if (q) {
    // Search across everything
    items = state.pdfs.filter(p =>
      p.title.toLowerCase().includes(q) ||
      (p.category && p.category.toLowerCase().includes(q))
    );
    const matchFolders = state.folders
      .filter(f => f.name.toLowerCase().includes(q))
      .sort((a, b) => (b.isFavorites ? 1 : 0) - (a.isFavorites ? 1 : 0));
    countLabel.textContent = `${matchFolders.length + items.length} result${matchFolders.length + items.length !== 1 ? "s" : ""}`;
    if (matchFolders.length === 0 && items.length === 0) {
      list.innerHTML = emptyHTML("No results", `Nothing matches "${searchQ}".`);
      return;
    }
    matchFolders.forEach(f => renderFolderCard(f, list));
    items.forEach(p => renderPdfCard(p, list));
    return;
  }

  // Inside a folder
  items = allPdfsInView();
  const folder = state.folders.find(f => f.id === state.currentFolder);
  countLabel.textContent = `${items.length} document${items.length !== 1 ? "s" : ""}`;
  if (items.length === 0) {
    if (folder && folder.isFavorites) {
      list.innerHTML = emptyHTML("No favorites yet", "Tap the star on any document to add it here.");
    } else {
      list.innerHTML = emptyHTML("Empty folder", "Tap ＋ to add PDFs here.");
    }
    return;
  }
  items.forEach(p => renderPdfCard(p, list));
}

function emptyHTML(title, sub) {
  return `<div class="empty-state">
    <div class="empty-icon">📂</div>
    <div class="empty-title">${title}</div>
    <div class="empty-sub">${sub}</div>
  </div>`;
}

function renderFolderCard(folder, container) {
  const count = folderPdfCount(folder.id);
  const div = document.createElement("div");
  div.className = "folder-card" + (folder.isFavorites ? " folder-card-favorites" : "");
  const icon = folder.isFavorites ? "⭐" : "📁";
  const deleteBtn = folder.isFavorites ? "" : `<button class="card-action-btn danger" title="Delete folder" onclick="event.stopPropagation();deleteFolder('${folder.id}')">🗑️</button>`;
  div.innerHTML = `
    <div class="folder-left" style="flex:1;min-width:0;">
      <div class="folder-icon">${icon}</div>
      <div>
        <div class="folder-name">${folder.name}</div>
        <div class="folder-count">${count} document${count !== 1 ? "s" : ""}</div>
      </div>
    </div>
    <div class="folder-actions">
      <button class="card-action-btn" title="Rename" onclick="event.stopPropagation();openRenameFolder('${folder.id}')">✏️</button>
      ${deleteBtn}
    </div>
  `;
  div.onclick = () => openFolder(folder.id);
  container.appendChild(div);
}

function renderPdfCard(pdf, container) {
  const isBuiltin = pdf.isBuiltin || pdf.builtin;
  const div = document.createElement("div");
  div.className = "pdf-card";

  const starIcon = pdf.favorite ? "⭐" : "☆";
  const deleteBtn = isBuiltin ? "" : `<button class="card-action-btn danger" title="Delete" onclick="event.stopPropagation();deletePdf('${pdf.id}')">🗑️</button>`;

  const actionButtons = `
    <div class="pdf-actions">
      <button class="card-action-btn" title="${pdf.favorite ? "Remove from favorites" : "Add to favorites"}" onclick="event.stopPropagation();toggleFavorite('${pdf.id}')">${starIcon}</button>
      <button class="card-action-btn" title="Rename" onclick="event.stopPropagation();openRenamePdf('${pdf.id}')">✏️</button>
      <button class="card-action-btn" title="Move to folder" onclick="event.stopPropagation();openMoveModal('${pdf.id}')">📂</button>
      ${deleteBtn}
    </div>
  `;

  div.innerHTML = `
    <div class="pdf-left">
      <div class="pdf-icon">${isBuiltin ? "📖" : "📄"}</div>
      <div class="pdf-info">
        <div class="pdf-title">${pdf.title}</div>
        <div class="pdf-meta">${pdf.category || (isBuiltin ? "" : "Added")}</div>
      </div>
    </div>
    ${actionButtons}
  `;
  div.onclick = () => openPdf(pdf);
  container.appendChild(div);
}

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goRoot() {
  state.currentFolder = null;
  document.getElementById("searchInput").value = "";
  render();
}
function openFolder(fid) {
  state.currentFolder = fid;
  document.getElementById("searchInput").value = "";
  render();
}
function onSearch(val) {
  render(val);
}

// ─────────────────────────────────────────────
// OPEN PDF
// ─────────────────────────────────────────────
async function openPdf(pdf) {
  if (pdf.isBuiltin || pdf.builtin) {
    window.open(pdf.url, "_blank");
    return;
  }

  try {
    const blob = await getBlob(pdf.storeKey);

    if (!blob) {
      toast("File not found.");
      return;
    }

    const file = new File([blob], pdf.title + ".pdf", {
      type: "application/pdf"
    });

    if (navigator.canShare && navigator.share) {
      await navigator.share({
        title: pdf.title,
        files: [file]
      });
      return;
    }

    const url = URL.createObjectURL(blob);
    window.open(url, "_blank");

    setTimeout(() => {
      URL.revokeObjectURL(url);
    }, 10000);

  } catch (e) {
    console.error(e);
    toast("Could not open PDF.");
  }
}

function closeViewer() {
  const frame = document.getElementById("pdfFrame");
  URL.revokeObjectURL(frame.src);
  frame.src = "";
  document.getElementById("viewer").classList.remove("open");
}

// ─────────────────────────────────────────────
// FOLDER CRUD
// ─────────────────────────────────────────────
function openNewFolder() {
  state.editingFolderId = null;
  document.getElementById("folderModalTitle").textContent = "New Folder";
  document.getElementById("folderNameInput").value = "";
  document.getElementById("folderModal").classList.add("open");
  setTimeout(() => document.getElementById("folderNameInput").focus(), 100);
}
function openRenameFolder(fid) {
  const folder = state.folders.find(f => f.id === fid);
  if (!folder) return;
  state.editingFolderId = fid;
  document.getElementById("folderModalTitle").textContent = "Rename Folder";
  document.getElementById("folderNameInput").value = folder.name;
  document.getElementById("folderModal").classList.add("open");
  setTimeout(() => document.getElementById("folderNameInput").focus(), 100);
}
function closeFolderModal() {
  document.getElementById("folderModal").classList.remove("open");
  state.editingFolderId = null;
}
function saveFolder() {
  const name = document.getElementById("folderNameInput").value.trim();
  if (!name) { toast("Please enter a folder name."); return; }
  if (state.editingFolderId) {
    const f = state.folders.find(f => f.id === state.editingFolderId);
    if (f) f.name = name;
    toast("Folder renamed.");
  } else {
    state.folders.push({ id: uid(), name });
    toast(`"${name}" created.`);
  }
  saveState();
  closeFolderModal();
  render();
}
function deleteFolder(fid) {
  const folder = state.folders.find(f => f.id === fid);
  if (folder && folder.isFavorites) { toast("Favorites can't be deleted."); return; }
  if (!confirm("Delete this folder? PDFs inside will move to the main library.")) return;
  // Move PDFs to root
  state.pdfs.forEach(p => { if (p.folderId === fid) p.folderId = null; });
  state.folders = state.folders.filter(f => f.id !== fid);
  if (state.currentFolder === fid) state.currentFolder = null;
  saveState();
  render();
  toast("Folder deleted.");
}

// ─────────────────────────────────────────────
// ADD PDF
// ─────────────────────────────────────────────
function populateFolderSelects() {
  [document.getElementById("pdfFolderSelect"), document.getElementById("moveFolderSelect")].forEach(sel => {
    if (!sel) return;
    const current = sel.value;
    sel.innerHTML = `<option value="">— No folder —</option>`;
    state.folders.filter(f => !f.isFavorites).forEach(f => {
      sel.innerHTML += `<option value="${f.id}">${f.name}</option>`;
    });
    sel.value = current;
  });
}

function openAddPdf() {
  state.pendingFiles = [];
  document.getElementById("pdfTitleInput").value = "";
  document.getElementById("uploadZoneText").innerHTML = `Tap to choose a PDF<br><strong>from your device</strong>`;
  document.getElementById("fileInput").value = "";
  populateFolderSelects();
  // Pre-select current folder
  if (state.currentFolder) {
    document.getElementById("pdfFolderSelect").value = state.currentFolder;
  } else {
    document.getElementById("pdfFolderSelect").value = "";
  }
  document.getElementById("addPdfModal").classList.add("open");
}
function closeAddPdf() {
  document.getElementById("addPdfModal").classList.remove("open");
  state.pendingFiles = [];
}

document.getElementById("fileInput").addEventListener("change", function() {
  const files = Array.from(this.files);
  if (!files.length) return;
  state.pendingFiles = files;
  if (files.length === 1) {
    document.getElementById("uploadZoneText").innerHTML = `<strong>${files[0].name}</strong>`;
    const nameStem = files[0].name.replace(/\.pdf$/i, "");
    if (!document.getElementById("pdfTitleInput").value.trim()) {
      document.getElementById("pdfTitleInput").value = nameStem;
    }
  } else {
    document.getElementById("uploadZoneText").innerHTML = `<strong>${files.length} files selected</strong>`;
    document.getElementById("pdfTitleInput").placeholder = "Titles from filenames";
    document.getElementById("pdfTitleInput").value = "";
  }
});

// Drag support on upload zone
const uploadZone = document.getElementById("uploadZone");
uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("drag"); });
uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("drag"));
uploadZone.addEventListener("drop", e => {
  e.preventDefault();
  uploadZone.classList.remove("drag");
  const files = Array.from(e.dataTransfer.files).filter(f => f.type === "application/pdf");
  if (!files.length) { toast("Please drop PDF files only."); return; }
  state.pendingFiles = files;
  document.getElementById("uploadZoneText").innerHTML = files.length === 1
    ? `<strong>${files[0].name}</strong>`
    : `<strong>${files.length} PDFs selected</strong>`;
  if (files.length === 1 && !document.getElementById("pdfTitleInput").value.trim()) {
    document.getElementById("pdfTitleInput").value = files[0].name.replace(/\.pdf$/i, "");
  }
});

async function savePdf() {
  if (!state.pendingFiles.length) { toast("Please choose a PDF file first."); return; }
  const folderId = document.getElementById("pdfFolderSelect").value || null;
  const customTitle = document.getElementById("pdfTitleInput").value.trim();

  for (const file of state.pendingFiles) {
    const storeKey = uid();
    const title = (state.pendingFiles.length === 1 && customTitle)
      ? customTitle
      : file.name.replace(/\.pdf$/i, "");
    try {
      await storeBlob(storeKey, file);
      state.pdfs.push({ id: uid(), title, folderId, storeKey, category: null, favorite: false, builtin: false });
    } catch(e) {
      toast(`Failed to save "${file.name}".`);
      continue;
    }
  }

  saveState();
  closeAddPdf();
  if (folderId) openFolder(folderId);
  else render();
  toast(state.pendingFiles.length === 1
    ? `"${state.pendingFiles[0].name.replace(/\.pdf$/i,"")}" added.`
    : `${state.pendingFiles.length} PDFs added.`
  );
  state.pendingFiles = [];
}

// ─────────────────────────────────────────────
// MOVE PDF
// ─────────────────────────────────────────────
function openMoveModal(pid) {
  state.movingPdfId = pid;
  populateFolderSelects();
  const pdf = state.pdfs.find(p => p.id === pid);
  document.getElementById("moveFolderSelect").value = pdf ? (pdf.folderId || "") : "";
  document.getElementById("movePdfModal").classList.add("open");
}
function closeMoveModal() {
  document.getElementById("movePdfModal").classList.remove("open");
  state.movingPdfId = null;
}
function confirmMove() {
  const pdf = state.pdfs.find(p => p.id === state.movingPdfId);
  if (!pdf) { closeMoveModal(); return; }
  const fid = document.getElementById("moveFolderSelect").value || null;
  pdf.folderId = fid;
  saveState();
  closeMoveModal();
  render();
  toast("Moved.");
}

// ─────────────────────────────────────────────
// FAVORITE TOGGLE
// ─────────────────────────────────────────────
function toggleFavorite(pid) {
  const pdf = state.pdfs.find(p => p.id === pid);
  if (!pdf) return;
  pdf.favorite = !pdf.favorite;
  saveState();
  render(document.getElementById("searchInput").value);
  toast(pdf.favorite ? "Added to Favorites." : "Removed from Favorites.");
}

// ─────────────────────────────────────────────
// RENAME PDF
// ─────────────────────────────────────────────
function openRenamePdf(pid) {
  const pdf = state.pdfs.find(p => p.id === pid);
  if (!pdf) return;
  state.renamingPdfId = pid;
  document.getElementById("pdfRenameInput").value = pdf.title;
  document.getElementById("pdfRenameModal").classList.add("open");
  setTimeout(() => document.getElementById("pdfRenameInput").focus(), 100);
}
function closeRenamePdfModal() {
  document.getElementById("pdfRenameModal").classList.remove("open");
  state.renamingPdfId = null;
}
function saveRenamePdf() {
  const title = document.getElementById("pdfRenameInput").value.trim();
  if (!title) { toast("Please enter a title."); return; }
  const pdf = state.pdfs.find(p => p.id === state.renamingPdfId);
  if (pdf) pdf.title = title;
  saveState();
  closeRenamePdfModal();
  render(document.getElementById("searchInput").value);
  toast("Renamed.");
}

// ─────────────────────────────────────────────
// DELETE PDF
// ─────────────────────────────────────────────
async function deletePdf(pid) {
  const pdf = state.pdfs.find(p => p.id === pid);
  if (!pdf) return;
  if (pdf.builtin) { toast("Built-in readings can't be deleted, only renamed or foldered."); return; }
  if (!confirm(`Delete "${pdf.title}"?`)) return;
  if (pdf.storeKey) await deleteBlob(pdf.storeKey);
  state.pdfs = state.pdfs.filter(p => p.id !== pid);
  saveState();
  render();
  toast("Deleted.");
}

// ─────────────────────────────────────────────
// CLOSE MODALS ON OVERLAY CLICK
// ─────────────────────────────────────────────
["folderModal","addPdfModal","movePdfModal","pdfRenameModal"].forEach(id => {
  document.getElementById(id).addEventListener("click", function(e) {
    if (e.target === this) {
      this.classList.remove("open");
      if (id === "addPdfModal") state.pendingFiles = [];
      if (id === "movePdfModal") state.movingPdfId = null;
      if (id === "folderModal") state.editingFolderId = null;
      if (id === "pdfRenameModal") state.renamingPdfId = null;
    }
  });
});

// Enter key in folder name input
document.getElementById("folderNameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") saveFolder();
});

// Enter key in PDF rename input
document.getElementById("pdfRenameInput").addEventListener("keydown", e => {
  if (e.key === "Enter") saveRenamePdf();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
openDB().then(() => {
  loadState();
  ensureFavoritesFolder();
  render();
});
</script>
